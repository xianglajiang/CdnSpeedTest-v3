<!DOCTYPE html>
<html><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>CDN测速</title><style>body{font-family:-apple-system,system-ui;background:#f5f5f5;padding:16px;max-width:480px;margin:0 auto}h1{text-align:center;color:#333}.card{background:#fff;border-radius:12px;padding:16px;margin-bottom:12px;box-shadow:0 2px 8px rgba(0,0,0,.1)}.input{display:flex;gap:8px;margin-bottom:10px}.input input{flex:1;padding:10px;border:1px solid #ddd;border-radius:8px}.btn{padding:12px;border:none;border-radius:8px;cursor:pointer;width:100%;margin-bottom:8px;background:#2196F3;color:#fff}.item{display:flex;justify-content:space-between;padding:10px;border-bottom:1px solid #eee}.ip{color:#2196F3;font-family:monospace}.del{color:#f44336}.result{display:flex;justify-content:space-between;padding:10px;border-bottom:1px solid #eee}.speed{color:#4CAF50;font-weight:600}</style></head><body><h1>🚀 CDN测速</h1><div class="card"><div class="input"><input id="n" placeholder="名称"><input id="i" placeholder="IP"></div><button class="btn" onclick="add()" style="background:#FF9800">+添加</button><div id="l"></div></div><div class="card"><input id="u" value="https://www.google.com" style="width:100%;padding:10px;margin-bottom:10px;border:1px solid #ddd;border-radius:8px"><button class="btn" onclick="start()">🚀开始测速</button><div id="r"></div></div></div><script>let c=[{n:'阿里云',i:'223.5.5.5'},{n:'腾讯云',i:'119.29.29.29'},{n:'114DNS',i:'114.114.114.114'}];
function render(){document.getElementById('l').innerHTML=c.map((x,j)=>'<div class="item"><span>'+x.n+' ('+x.i+')</span><span class="del" onclick="del('+j+')">✕</span></div>').join('');}
function add(){let n=document.getElementById('n').value,i=document.getElementById('i').value;if(n&&i){c.push({n:n,i:i});document.getElementById('n').value='';document.getElementById('i').value='';render()}}
function del(j){c.splice(j,1);render()}
async function start(){let u=document.getElementById('u').value;if(!u)return;document.getElementById('r').innerHTML='测速中...';let rs=[];for(let x of c){let s=await t(x.i,u);rs.push({...x,s});document.getElementById('r').innerHTML=rs.map((y,k)=>'<div class="result"><span>'+(k+1)+'. '+y.n+' ('+y.i+')</span><span class="speed">'+(y.s?y.s+'ms':'失败')+'</span></div>').join('')}}
function t(i,u){return new Promise(r=>{let s=Date.now(),img=new Image();img.onload=()=>r(Date.now()-s);img.onerror=()=>r(0);img.src=u+'?t='+Date.now();setTimeout(()=>r(0),10000)})}
render()</script></body></html>
